# Render Blueprint — native Python runtime (no Docker)
# Docs: https://docs.render.com/infrastructure-as-code
# How to use: push this file to your GitHub repo → Render detects it automatically
#   OR: Render dashboard → New → Blueprint → select your repo

services:
  - type: web
    name: catalyst-api
    runtime: python           # Native Python — no Docker needed
    region: oregon
    plan: free                # Switch to "starter" for persistent disk / more RAM
    rootDir: backend          # Render runs all commands from here
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: catalyst-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FRONTEND_URL
        sync: false           # Set this manually AFTER you get your Vercel URL
                              # e.g. https://catalyst-m.vercel.app

databases:
  - name: catalyst-db
    databaseName: catalyst
    plan: free                # Free tier: 256 MB RAM, 1 GB storage
    region: oregon
